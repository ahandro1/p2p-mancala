<!--
  MANCALA — Webflow HTMLtoFlow conversion package
  =================================================
  Purpose: paste into the HTMLtoFlow Webflow Designer app to auto-generate
  native Webflow elements + classes on a FREE Webflow plan. This is the
  decorative shell/frame that will surround the game iframe on the live
  Webflow page. The iframe itself is added BY HAND afterwards (see
  webflow/snippets.md) — nothing here is a working game embed.

  Conversion constraints followed (do not violate when editing):
    - Vanilla HTML + CSS3 only. No <script>, no <iframe>, no <link>,
      no @import, no inline event handlers.
    - Exactly ONE class per element (Webflow combo classes only keep the
      first class listed, so multi-class elements would silently lose
      classes on conversion).
    - Simple class selectors only (.classname). No descendant/child
      combinators, no attribute selectors, no ::before/::after, no
      var()/custom properties, no @keyframes. :hover is fine.
    - Literal color values only (no functions besides linear-gradient,
      which Webflow's background-gradient control understands natively).
    - System font stack only for now. Swap to a Google Font (try
      "Lilita One" for that Club-Penguin-arcade italic-comic look) later
      using Webflow's own font picker on the mancala-title class — do not
      add @font-face or <link> here, Webflow manages font loading itself.
    - No id attributes, no custom/data attributes.
    - No images — the glossy "arcade" panel look is built from gradients,
      border-radius, and box-shadow only.

  HOW TO PASTE:
    - If HTMLtoFlow accepts one combined paste, paste the whole file as-is.
    - If it has separate CSS and HTML inputs, split at the
      "===== SPLIT HERE ===== " delimiter comment below: everything above
      goes in the CSS box, everything below (from <section ...) goes in
      the HTML box.
-->
